<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .th { font-size: 13px; font-weight: 600; }
  .ts { font-size: 11px; fill: #666; }
  .arr { stroke: #888; stroke-width: 1.5; }
  /* Green nodes - Data */
  .n-green rect { fill: #EAF3DE; stroke: #639922; stroke-width: 0.5; }
  .n-green .th { fill: #27500A; }
  .n-green .ts { fill: #3B6D11; }
  /* Teal nodes - Storage/Retrieval */
  .n-teal rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .n-teal .th { fill: #04342C; }
  .n-teal .ts { fill: #0F6E56; }
  /* Purple nodes - User/UI */
  .n-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
  .n-purple .th { fill: #26215C; }
  .n-purple .ts { fill: #534AB7; }
  /* Coral nodes - Prompts */
  .n-coral rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
  .n-coral .th { fill: #4A1B0C; }
  .n-coral .ts { fill: #993C1D; }
  /* Blue nodes - LLM */
  .n-blue rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
  .n-blue .th { fill: #042C53; }
  .n-blue .ts { fill: #185FA5; }
  /* Amber nodes - Explainability */
  .n-amber rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
  .n-amber .th { fill: #412402; }
  .n-amber .ts { fill: #854F0B; }
  .label { font-size: 14px; font-weight: 600; fill: #333; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="label" x="340" y="30" text-anchor="middle">Data ingestion</text>

<g class="n-green">
<rect x="60" y="46" width="130" height="44" rx="8"/>
<text class="th" x="125" y="68" text-anchor="middle" dominant-baseline="central">5 text documents</text>
</g>
<line x1="190" y1="68" x2="230" y2="68" class="arr" marker-end="url(#arrow)"/>
<g class="n-green">
<rect x="232" y="46" width="130" height="44" rx="8"/>
<text class="th" x="297" y="62" text-anchor="middle" dominant-baseline="central">Chunking</text>
<text class="ts" x="297" y="78" text-anchor="middle" dominant-baseline="central">500 chars, 50 overlap</text>
</g>
<line x1="362" y1="68" x2="402" y2="68" class="arr" marker-end="url(#arrow)"/>
<g class="n-green">
<rect x="404" y="46" width="130" height="44" rx="8"/>
<text class="th" x="469" y="62" text-anchor="middle" dominant-baseline="central">Embedding</text>
<text class="ts" x="469" y="78" text-anchor="middle" dominant-baseline="central">MiniLM-L6-v2</text>
</g>
<line x1="469" y1="90" x2="469" y2="130" class="arr" marker-end="url(#arrow)"/>

<g class="n-teal">
<rect x="354" y="132" width="230" height="50" rx="8"/>
<text class="th" x="469" y="150" text-anchor="middle" dominant-baseline="central">ChromaDB vector store</text>
<text class="ts" x="469" y="168" text-anchor="middle" dominant-baseline="central">36 chunks, cosine similarity</text>
</g>

<g class="n-purple">
<rect x="80" y="220" width="200" height="44" rx="8"/>
<text class="th" x="180" y="242" text-anchor="middle" dominant-baseline="central">Farmer's question</text>
</g>
<line x1="280" y1="242" x2="330" y2="242" class="arr" marker-end="url(#arrow)"/>
<g class="n-teal">
<rect x="332" y="220" width="140" height="44" rx="8"/>
<text class="th" x="402" y="236" text-anchor="middle" dominant-baseline="central">Query embedding</text>
<text class="ts" x="402" y="252" text-anchor="middle" dominant-baseline="central">Same model</text>
</g>
<line x1="402" y1="220" x2="402" y2="184" class="arr" marker-end="url(#arrow)" stroke="#0F6E56" stroke-width="1"/>
<line x1="469" y1="182" x2="469" y2="310" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="486" y="254" text-anchor="start">Top-K chunks</text>

<text class="label" x="340" y="310" text-anchor="middle">Prompt engineering</text>

<g class="n-coral">
<rect x="60" y="326" width="140" height="44" rx="8"/>
<text class="th" x="130" y="342" text-anchor="middle" dominant-baseline="central">Zero-shot</text>
<text class="ts" x="130" y="358" text-anchor="middle" dominant-baseline="central">Direct prompting</text>
</g>
<g class="n-coral">
<rect x="220" y="326" width="140" height="44" rx="8"/>
<text class="th" x="290" y="342" text-anchor="middle" dominant-baseline="central">Few-shot</text>
<text class="ts" x="290" y="358" text-anchor="middle" dominant-baseline="central">With examples</text>
</g>
<g class="n-coral">
<rect x="380" y="326" width="180" height="44" rx="8"/>
<text class="th" x="470" y="342" text-anchor="middle" dominant-baseline="central">Chain-of-thought</text>
<text class="ts" x="470" y="358" text-anchor="middle" dominant-baseline="central">Step-by-step reasoning</text>
</g>

<line x1="130" y1="370" x2="130" y2="408" stroke="#888" stroke-width="0.5"/>
<line x1="290" y1="370" x2="290" y2="408" stroke="#888" stroke-width="0.5"/>
<line x1="470" y1="370" x2="470" y2="408" stroke="#888" stroke-width="0.5"/>
<line x1="130" y1="408" x2="470" y2="408" stroke="#888" stroke-width="0.5"/>
<line x1="300" y1="408" x2="300" y2="430" class="arr" marker-end="url(#arrow)"/>

<g class="n-blue">
<rect x="180" y="432" width="240" height="50" rx="8"/>
<text class="th" x="300" y="450" text-anchor="middle" dominant-baseline="central">Gemini API</text>
<text class="ts" x="300" y="468" text-anchor="middle" dominant-baseline="central">Context + query → answer</text>
</g>
<line x1="300" y1="482" x2="300" y2="520" class="arr" marker-end="url(#arrow)"/>

<text class="label" x="340" y="536" text-anchor="middle">Explainability layer</text>

<g class="n-amber">
<rect x="50" y="550" width="170" height="44" rx="8"/>
<text class="th" x="135" y="566" text-anchor="middle" dominant-baseline="central">Source attribution</text>
<text class="ts" x="135" y="582" text-anchor="middle" dominant-baseline="central">Document + relevance</text>
</g>
<g class="n-amber">
<rect x="240" y="550" width="170" height="44" rx="8"/>
<text class="th" x="325" y="566" text-anchor="middle" dominant-baseline="central">Faithfulness check</text>
<text class="ts" x="325" y="582" text-anchor="middle" dominant-baseline="central">Hallucination detection</text>
</g>
<g class="n-amber">
<rect x="430" y="550" width="190" height="44" rx="8"/>
<text class="th" x="525" y="566" text-anchor="middle" dominant-baseline="central">Strategy comparison</text>
<text class="ts" x="525" y="582" text-anchor="middle" dominant-baseline="central">Side-by-side evaluation</text>
</g>

<line x1="135" y1="594" x2="135" y2="624" stroke="#888" stroke-width="0.5"/>
<line x1="325" y1="594" x2="325" y2="624" stroke="#888" stroke-width="0.5"/>
<line x1="525" y1="594" x2="525" y2="624" stroke="#888" stroke-width="0.5"/>
<line x1="135" y1="624" x2="525" y2="624" stroke="#888" stroke-width="0.5"/>
<line x1="330" y1="624" x2="330" y2="646" class="arr" marker-end="url(#arrow)"/>

<g class="n-purple">
<rect x="80" y="648" width="220" height="44" rx="8"/>
<text class="th" x="190" y="670" text-anchor="middle" dominant-baseline="central">Farmer view</text>
</g>
<g class="n-purple">
<rect x="340" y="648" width="220" height="44" rx="8"/>
<text class="th" x="450" y="670" text-anchor="middle" dominant-baseline="central">Researcher dashboard</text>
</g>
<text class="ts" x="340" y="712" text-anchor="middle">Streamlit web interface</text>
</svg>